wire_format: openai_responses
chat_endpoint: "https://api.openai.com/v1/responses"
embedding_endpoint: "https://api.openai.com/v1/embeddings"
supports_completion: false

api_key: "sk-..."

running_models:
  - gpt-4.1
  - gpt-4o
  - gpt-4.1-mini
  - gpt-4o-mini
  - gpt-4.1-nano
  - gpt-4.5-preview
  - o3-mini
  - o1-mini
  - o1

chat_models:
  # GPT-4.1 family
  gpt-4.1:
    n_ctx: 1047576
    default_max_tokens: 8192
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

  gpt-4.1-mini:
    n_ctx: 1047576
    default_max_tokens: 8192
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

  gpt-4.1-nano:
    n_ctx: 1047576
    default_max_tokens: 8192
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

  gpt-4.5-preview:
    n_ctx: 128000
    default_max_tokens: 16384
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

  # GPT-4o family
  gpt-4o:
    n_ctx: 128000
    default_max_tokens: 8192
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

  gpt-4o-mini:
    n_ctx: 128000
    default_max_tokens: 8192
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

  # OpenAI Reasoning models (o-series)
  o1:
    n_ctx: 200000
    default_max_tokens: 100000
    supports_tools: true
    supports_multimodality: true
    supports_reasoning: openai
    supports_boost_reasoning: true
    tokenizer: hf://Xenova/gpt-4o

  o1-mini:
    n_ctx: 128000
    default_max_tokens: 65536
    supports_tools: true
    supports_reasoning: openai
    tokenizer: hf://Xenova/gpt-4o

  o3-mini:
    n_ctx: 200000
    default_max_tokens: 100000
    supports_tools: true
    supports_agent: true
    supports_reasoning: openai
    supports_boost_reasoning: true
    tokenizer: hf://Xenova/gpt-4o

embedding_model:
  name: text-embedding-3-small
  embedding_size: 1536
  n_ctx: 8191

model_default_settings_ui:
  chat:
    n_ctx: 200000
    default_max_tokens: 8192
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o
