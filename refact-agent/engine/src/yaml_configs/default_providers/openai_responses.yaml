wire_format: openai_responses
chat_endpoint: "https://api.openai.com/v1/responses"
embedding_endpoint: "https://api.openai.com/v1/embeddings"
supports_completion: false

api_key: "sk-..."

running_models:
  - gpt-4.1
  - gpt-4o
  - gpt-4.1-mini
  - gpt-4o-mini
  - gpt-4.1-nano
  - gpt-4.5-preview
  - o3-mini
  - o1-mini
  - o1

embedding_model:
  name: text-embedding-3-small
  embedding_size: 1536
  n_ctx: 8191

model_default_settings_ui:
  chat:
    n_ctx: 200000
    supports_tools: true
    supports_strict_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o
