wire_format: openai_chat_completions
chat_endpoint: https://api.x.ai/v1/chat/completions
supports_completion: false

api_key: xai-...

running_models:
  - grok-3-beta
  - grok-3-mini-beta

chat_models:
  grok-3-beta:
    n_ctx: 131072
    default_max_tokens: 8192
    supports_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/grok-1-tokenizer

  grok-3-mini-beta:
    n_ctx: 131072
    default_max_tokens: 8192
    supports_tools: true
    supports_agent: true
    supports_reasoning: xai
    supports_boost_reasoning: true
    tokenizer: hf://Xenova/grok-1-tokenizer

model_default_settings_ui:
  chat:
    n_ctx: 131072
    default_max_tokens: 8192
    supports_tools: true
    supports_agent: true
    tokenizer: hf://Xenova/grok-1-tokenizer