wire_format: openai_chat_completions
chat_endpoint: https://openrouter.ai/api/v1/chat/completions
embedding_endpoint: https://openrouter.ai/api/v1/embeddings
supports_completion: false

api_key: "sk-or-..."

running_models:
  - anthropic/claude-3.7-sonnet
  - openai/o3-mini
  - openai/gpt-4.1

chat_models:
  anthropic/claude-3.7-sonnet:
    n_ctx: 200000
    default_max_tokens: 16384
    default_temperature: 1.0
    supports_tools: true
    supports_multimodality: true
    supports_agent: true
    supports_reasoning: anthropic
    supports_boost_reasoning: true
    tokenizer: hf://Xenova/claude-tokenizer

  openai/o3-mini:
    n_ctx: 200000
    default_max_tokens: 100000
    supports_tools: true
    supports_agent: true
    supports_reasoning: openai
    supports_boost_reasoning: true
    supports_max_completion_tokens: true
    tokenizer: hf://Xenova/gpt-4o

  openai/gpt-4.1:
    n_ctx: 1047576
    default_max_tokens: 8192
    supports_tools: true
    supports_multimodality: true
    supports_agent: true
    tokenizer: hf://Xenova/gpt-4o

embedding_model:
  name: openai/text-embedding-3-small
  embedding_size: 1536
  n_ctx: 8191

model_default_settings_ui:
  chat:
    default_max_tokens: 8192
    tokenizer: fake