  - cat
  - add_workspace_folder
  - search_pattern
  - search_symbol_definition
  - search_semantic
  - activate_skill
  - deactivate_skill
  - knowledge
  - create_knowledge
  - search_trajectories
  - get_trajectory_context
  - web
  - web_search
  - shell
  - create_textdoc
  - update_textdoc
  - update_textdoc_anchored
  - update_textdoc_by_lines
  - update_textdoc_regex
  - undo_textdoc
  - rm
  - mv
  - subagent
  - strategic_planning
  - code_review
  - deep_research
  - tasks_set
  - task_done
  - ask_questions

tool_confirm:
  rules:
    - match: "tree"
      action: auto
    - match: "cat"
      action: auto
    - match: "search_*"
      action: auto
    - match: "activate_skill"
      action: auto
    - match: "deactivate_skill"
      action: auto
    - match: "knowledge"
      action: auto
    - match: "web*"
      action: auto
    - match: "tasks_set"
      action: auto
    - match: "task_done"
      action: auto
    - match: "ask_questions"
      action: auto
