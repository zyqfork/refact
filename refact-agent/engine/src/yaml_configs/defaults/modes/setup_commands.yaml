    - match: "search_*"
      action: auto
    - match: "web*"
      action: auto
    - match: "knowledge"
      action: auto
    - match: "get_trajectory_context"
      action: auto
    - match: "subagent"
      action: ask
    - match: "tasks_set"
      action: auto
    - match: "task_done"
      action: auto
    - match: "ask_questions"
      action: auto
    - match: "shell"
      action: ask
    - match: "create_textdoc"
