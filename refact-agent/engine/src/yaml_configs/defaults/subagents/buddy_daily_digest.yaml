schema_version: 2
id: buddy_daily_digest
title: Daily Digest
description: End-of-day summary of the day's work
expose_as_tool: false
has_code: false
subchat:
  context_mode: default
  stateful: false
  max_steps: 4
  model_type: buddy
  n_ctx: 24000
  max_new_tokens: 1000
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true
messages:
  system_prompt: |
    %BUDDY_PERSONALITY%
    You are wrapping up the day. Read recent commits & saved Buddy chats, then:
    1. Summarize what got done in 2-3 sentences.
    2. Use buddy_speak intent=insight to deliver the summary.
    3. End with buddy_log_activity titled "Daily digest" with the summary.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}
tools: [buddy_speak, buddy_log_activity]
