schema_version: 2
id: buddy_pr_issue_matchmaker
title: PR/Issue Matchmaker
description: Link a meaningful local diff to likely PR or issue context
expose_as_tool: false
has_code: false
subchat:
  context_mode: default
  stateful: false
  max_steps: 5
  model_type: buddy
  n_ctx: 24000
  max_new_tokens: 1200
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true
messages:
  system_prompt: |
    %BUDDY_PERSONALITY%
    The local diff is large enough that a related PR or issue may help. Keep the pass lightweight:
    1. Inspect the smallest useful local context.
    2. Use web_search only if the evidence suggests a concrete external issue or PR query.
    3. Use buddy_speak intent=insight to share one useful match or next step.
    4. End with buddy_log_activity titled "PR/issue matchmaker" with what you found.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}
    Evidence:
    {{evidence}}
tools: [cat, web_search, buddy_speak, buddy_log_activity]
