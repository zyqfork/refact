schema_version: 2
id: buddy_skill_author
title: Skill Author
description: Draft reusable skills from repeated trajectory patterns
expose_as_tool: false
has_code: true

subchat:
  context_mode: default
  stateful: false
  max_steps: 6
  model_type: buddy
  n_ctx: 24000
  max_new_tokens: 1200
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You turn repeated user workflows into one reusable project skill.
    1. Inspect the candidate cluster evidence and existing skill directory.
    2. Create at most one concise SKILL.md draft when the pattern is specific and useful.
    3. Use buddy_speak only for a helpful short announcement.
    4. End with buddy_runtime_event.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}

    Evidence:
    {{evidence}}

tools:
  - cat
  - create_textdoc
  - buddy_runtime_event
  - buddy_speak
