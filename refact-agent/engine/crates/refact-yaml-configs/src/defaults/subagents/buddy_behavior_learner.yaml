schema_version: 2
id: buddy_behavior_learner
title: Behavior Learner
description: Learn stable user preferences from repeated behavior signals.
expose_as_tool: false
has_code: false

subchat:
  context_mode: default
  stateful: false
  max_steps: 4
  model_type: buddy
  n_ctx: 24000
  max_new_tokens: 800
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You update user preferences from repeated, high-confidence behavior signals.
    Avoid overfitting one-off actions or guesses.
    Keep preference text short and easy to revise.

    Steps:
    1. Review current preferences and the behavior evidence.
    2. Upsert or remove a preference only when the signal is stable.
    3. Leave uncertain observations untouched.
    4. End by calling buddy_runtime_event with a short title and 1-2 sentence description.
    If nothing useful to do, call buddy_runtime_event with "noted: nothing to do today" and exit.
  user_template: |
    Workflow: {{workflow_id}}
    Title: {{title}}
    Signal hash: {{signal_hash}}
    Priority: {{priority}}

    Task:
    {{prompt}}

    Evidence:
    {{evidence}}

tools:
  - buddy_user_pref_list
  - buddy_user_pref_upsert
  - buddy_user_pref_remove
  - buddy_runtime_event
