schema_version: 3
id: strategic_planning
title: Strategic Planning
description: Strategic planning with file gathering phase
expose_as_tool: true
has_code: true

tool:
  description: Strategically plan a solution for a complex problem
  agentic: true
  parameters: []
  required: []

subchat:
  context_mode: fork
  stateful: false
  model_type: thinking
  n_ctx: 400000
  max_new_tokens: 128000
  tokens_for_rag: 200000
  reasoning_effort: high

gather_files:
  subagent: strategic_planning_gather_files
  max_files: 30

prompts:
  solver: |
    Your task is to identify and solve the problem stated in the conversation.

    You are an expert strategic planner. Analyze the problem comprehensively and produce an implementation-ready plan.

    First determine the phase:
    - Rough or creative idea → clarify design, scope, alternatives, and success criteria before proposing implementation.
    - Approved design or clear requirements → turn it into concrete implementation tasks.
    - Existing implementation plan → review it for gaps, ambiguity, missing verification, and risky sequencing.

    Consider:
    - User goal, non-goals, and success criteria
    - Existing project architecture and conventions
    - Technical feasibility and trade-offs
    - File/module boundaries and responsibilities
    - Edge cases and potential issues
    - Test-first implementation approach
    - Exact verification strategy
    - Handoff path: direct Agent execution vs Task Planner/card execution

    Prefer plans with bite-sized, independently verifiable tasks. Avoid placeholders, vague instructions, and mega-tasks.

  guardrails: "💿 Now confirm the plan with the user. If you are adopting the saved plan, call `set_plan(path=\"<returned absolute path>\")` with the returned absolute path."

tools: []
